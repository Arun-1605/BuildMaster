<div class="fp-wrap">
  <div class="fp-card">
    <h2>🏗️ BuildMaster</h2>

    <!-- ── Forgot mode ── -->
    <ng-container *ngIf="mode === 'forgot'">
      <h3>Forgot Password</h3>
      <p class="subtitle">Enter your registered email and we'll send you a reset link.</p>

      <div *ngIf="success" class="alert-success">{{ success }}</div>
      <div *ngIf="error"   class="alert-error">{{ error }}</div>

      <form (ngSubmit)="submitForgot()" *ngIf="!success">
        <div class="field">
          <label>Email Address</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" required />
        </div>
        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Sending…' : 'Send Reset Link' }}
        </button>
      </form>
    </ng-container>

    <!-- ── Reset mode ── -->
    <ng-container *ngIf="mode === 'reset'">
      <h3>Set New Password</h3>
      <p class="subtitle">Enter and confirm your new password below.</p>

      <div *ngIf="success" class="alert-success">{{ success }}</div>
      <div *ngIf="error"   class="alert-error">{{ error }}</div>

      <form (ngSubmit)="submitReset()" *ngIf="!success">
        <div class="field">
          <label>New Password</label>
          <input type="password" [(ngModel)]="newPassword" name="newPassword" placeholder="Min 6 characters" required />
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Repeat password" required />
        </div>
        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Resetting…' : 'Reset Password' }}
        </button>
      </form>
    </ng-container>

    <div class="links">
      <a routerLink="/login">← Back to Login</a>
    </div>
  </div>
</div>
